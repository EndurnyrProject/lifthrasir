<html lang="en">
  <head>
    <meta name="character_create" />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="character_create.css" />
  </head>
  <body id="cc-screen">
    <div class="cs-head">
      <p class="panel-kicker">Endurnir</p>
      <p class="panel-title">Create Character</p>
    </div>
    <div id="cc-stage">
      <div id="cc-preview">
        <div id="char-preview"></div>
      </div>
      <form id="cc-panel" action="create_character" validate="Send">
        <p class="cc-label">Name</p>
        <div class="field-box">
          <img class="field-ico" src="icons/user.svg" />
          <input id="cc-name" name="name" type="text" placeholder="Name your hero" maxlength="16" required />
        </div>

        <div class="opt-row">
          <p class="cc-label">Sex</p>
          <button class="seg-btn" type="button" onclick="toggle_sex"><p id="sex-value" class="seg-text">Male</p></button>
        </div>

        <div class="opt-row">
          <p class="cc-label">Hair Style</p>
          <div class="stepper">
            <button class="step-btn" type="button" onclick="hair_style_prev"><img src="icons/chevron-left.svg" /></button>
            <p id="hair-style-value" class="step-val">1</p>
            <button class="step-btn" type="button" onclick="hair_style_next"><img src="icons/chevron-right.svg" /></button>
          </div>
        </div>

        <div class="opt-row">
          <p class="cc-label">Hair Color</p>
          <div class="stepper">
            <button class="step-btn" type="button" onclick="hair_color_prev"><img src="icons/chevron-left.svg" /></button>
            <p id="hair-color-value" class="step-val">0</p>
            <button class="step-btn" type="button" onclick="hair_color_next"><img src="icons/chevron-right.svg" /></button>
          </div>
        </div>

        <p id="create-error"></p>
        <div class="cc-actions">
          <button class="btn-ghost" type="button" onclick="cancel_creation">Cancel</button>
          <button class="btn-primary" type="submit">Create Hero</button>
        </div>
      </form>
    </div>
  </body>
</html>
