<html lang="en">
  <head>
    <meta name="login" />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body id="login-screen">
    <form id="login-form" action="submit_login" validate="Send">
      <div id="login-panel">
        <div id="login-logo"></div>
        <div class="rule-gold"></div>
        <p class="field-label">Username</p>
        <div class="field-box">
          <img class="field-ico" src="icons/user.svg" />
          <input id="login-username" name="username" type="text" placeholder="Enter your name" maxlength="24" required />
        </div>
        <p class="field-label">Password</p>
        <div class="field-box">
          <img class="field-ico" src="icons/lock.svg" />
          <input id="login-password" name="password" type="password" placeholder="••••••••" maxlength="32" required />
        </div>
        <p id="login-error"></p>
        <button id="login-connect" type="submit">Enter Realm</button>
        <p class="btn-foot">New to the realm? <span class="link">Create account</span></p>
      </div>
    </form>
  </body>
</html>
