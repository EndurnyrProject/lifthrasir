[workspace]
resolver = "2"
members = [
    "game-engine",
    "grf-utils",
    "lifthrasir-data",
    "lifthrasir-ui",
    "lifthrasir",
    "ro-formats",
    "ro-to-lifthrasir-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
bevy = { version = "0.18.1", features = [
    "jpeg",
    "trace",
    "trace_tracy",
    "bevy_remote",
] }
secrecy = { version = "0.10", features = ["serde"] }
bevy_ui_text_input = "0.7.0"
leafwing-input-manager = "0.20"

[profile.dev.package."*"]
opt-level = 3

[profile.dev]
opt-level = 1
