[package]
name = "game-engine"
version.workspace = true
edition.workspace = true

[dependencies]
ro-formats = { path = "../ro-formats" }
lifthrasir-data = { path = "../lifthrasir-data" }
bevy = { workspace = true }
bevy_auto_plugin = "0.10.0"
bevy_common_assets = { version = "0.15", features = ["toml", "ron"] }
bevy_asset_loader = "0.26"
bevy_kira_audio = { version = "0.25", features = ["mp3", "wav", "ogg"] }
leafwing-input-manager = { workspace = true }

# Parsing and data processing
nom = "8.0.0"
thiserror = "2.0"
image = "0.25.8"
futures-lite = "2.6.1"
flate2 = "1.1"
encoding_rs = "0.8.35"
nalgebra = "0.35"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.9"
regex = "1.12"
once_cell = "1.21"
lru = "0.18"
base64 = "0.22"
mlua = { version = "0.11", features = ["lua51", "vendored", "serialize"] }
luadec = "0.2"
gag = "1.0"

# Networking dependencies
bytes = "1.11"
byteorder = "1.5"
async-trait = "0.1"

# Security dependencies
secrecy = { workspace = true }

# Async runtime integration
bevy-tokio-tasks = { version = "0.18" }

# Character entity system dependencies
moonshine-kind = "0.4"
moonshine-tag = "0.4"
moonshine-behavior = "0.4"

# Pathfinding
pathfinding = "4.15"

[features]
default = []
dynamic = ["bevy/dynamic_linking"]

[dev-dependencies]
ron = "0.12"
