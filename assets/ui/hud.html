<html lang="en">
  <head>
    <meta name="hud" />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="hud.css" />
  </head>
  <body id="hud-root">
    <div id="char-info">
      <p id="char-name" class="hud-name"></p>
      <p id="char-job" class="hud-text"></p>
      <p id="char-level" class="hud-text"></p>
      <p id="hp-text" class="hud-text"></p>
      <progressbar id="hp-bar" class="hud-bar"></progressbar>
      <p id="sp-text" class="hud-text"></p>
      <progressbar id="sp-bar" class="hud-bar"></progressbar>
    </div>
    <div id="chat-box">
      <scroll id="chat-scroll">
        <p id="chat-history" class="hud-text"></p>
      </scroll>
      <form id="chat-form" action="send_chat">
        <input
          id="chat-input"
          name="chat"
          type="text"
          placeholder="Enter to chat"
          maxlength="255"
        />
      </form>
    </div>
  </body>
</html>
